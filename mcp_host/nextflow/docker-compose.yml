services:
  app:
    build:
      context: ../..
      dockerfile: mcp_host/nextflow/Dockerfile
    
    # CRITICAL: Apptainer requires privileged mode to run containers
    privileged: true
    
    ports:
      - "${MCP_PORT}:${MCP_PORT}"
    
    environment:
      # MCP Server Configuration
      - MCP_PORT=${MCP_PORT}
      
      # Container workspace path
      - WORKSPACE_PATH=/app/workspace
      
      # Nextflow Configuration
      - NXF_HOME=/root/.nextflow
      - NXF_OPTS=-Xms512M -Xmx2G
      
      # Singularity image cache (persisted in workspace)
      - NXF_SINGULARITY_CACHEDIR=/app/workspace/singularity_images
      
      # Optional: Seqera Platform token
      - TOWER_ACCESS_TOKEN=${TOWER_ACCESS_TOKEN:-}
      
    volumes:
      # The workspace is mounted from your host machine
      # Default pipelines from the Docker image will be copied into this workspace
      # at startup if they don't already exist (see server.py startup logic)
      - ${HOST_WORKSPACE_PATH:-./workspace}:/app/workspace:rw
    
    working_dir: /app/workspace
    
    # Explicitly start the server (ensures it works even if Dockerfile CMD isn't updated yet)
    command: python3 /app/server.py
