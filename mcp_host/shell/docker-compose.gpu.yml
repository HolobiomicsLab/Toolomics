# GPU-enabled configuration for Linux with NVIDIA GPUs
# This file is automatically used by deploy.py when GPU is detected
services:
  app:
    build:
      context: ../..
      dockerfile: mcp_host/shell/Dockerfile
      args:
        - BASE_IMAGE=nvidia/cuda:13.0.1-cudnn-devel-ubuntu24.04
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "${MCP_PORT}:${MCP_PORT}"
    environment:
      - MCP_PORT=${MCP_PORT}
      - NVIDIA_VISIBLE_DEVICES=all
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ../../workspace:/app/workspace
