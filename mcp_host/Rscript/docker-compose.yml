services:
  xcmsrocker:
    platform: linux/amd64 # Force platform compatibility (mac os and arm architecture ...)
    build:
      context: ../..
      dockerfile: mcp_host/Rscript/Dockerfile
    container_name: xcmsrocker_${INSTANCE_ID}
    environment:
      - MCP_PORT=${MCP_PORT}
      - INSTANCE_ID=${INSTANCE_ID}
      - PASSWORD=xcmsrocker  # Set the password for RStudio Server (optional)
    ports:
      - "${MCP_PORT}:${MCP_PORT}"  # MCP server port
      - "${RSTUDIO_PORT}:8787"     # RStudio Server port (instance-specific)
    volumes:
      - ./rstudio_data_${INSTANCE_ID}:/home/rstudio  # Persist RStudio data (instance-specific)
      - ../../workspace:/app/workspace:rw  # Shared workspace
    restart: unless-stopped  # Auto-restart unless manually stopped
