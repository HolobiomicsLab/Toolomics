services:
  app:
    build:
      context: ../..
      dockerfile: mcp_host/shell/Dockerfile
      args:
        - BASE_IMAGE=ubuntu:24.04
    ports:
      - "${MCP_PORT}:${MCP_PORT}"
    environment:
      - MCP_PORT=${MCP_PORT}
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ../../workspace:/app/workspace:rw
