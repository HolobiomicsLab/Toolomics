services:
  redis:
    container_name: redis_${INSTANCE_ID}
    image: docker.io/valkey/valkey:8-alpine
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    volumes:
      - redis-data_${INSTANCE_ID}:/data
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  searxng:
    container_name: searxng_${INSTANCE_ID}
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    ports:
      - "${SEARXNG_PORT}:8080"
    volumes:
      - ./searxng_${INSTANCE_ID}:/etc/searxng:rw
      - ../../${WORKSPACE_PATH}:/workspace:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:${SEARXNG_PORT}/
      - UWSGI_WORKERS=1
      - UWSGI_THREADS=1
      - INSTANCE_ID=${INSTANCE_ID}
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
    depends_on:
      - redis

volumes:
  redis-data_${INSTANCE_ID}:
